name: LocalSync3 Selenium Tests

on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install test runner dependencies
        working-directory: backend/testing
        run: |
          npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Install Flutter app dependencies
        working-directory: frontend
        run: |
          flutter pub get

      - name: Build Flutter Web app
        working-directory: frontend
        run: |
          flutter build web --web-renderer html --release

      - name: Run Selenium E2E tests
        working-directory: backend/testing/selenium-tests
        run: |
          node test_suite.js

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localsync3-selenium-report
          path: backend/testing/selenium-tests/test_report.xlsx
