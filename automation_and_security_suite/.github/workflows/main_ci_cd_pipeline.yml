name: LocalSync Comprehensive CI/CD & Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  web-backend-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Web Test Dependencies
        run: |
          cd automation_and_security_suite/selenium_web_tests
          npm install

      - name: Install Python Load & Vuln Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Start Mock Backend Server
        run: |
          # Start a mock server in background to respond to endpoints for testing
          python -c "
          import http.server
          import socketserver
          import json

          class MockHandler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  data = {'status': 'success', 'data': []}
                  self.wfile.write(json.dumps(data).encode())
              def do_POST(self):
                  if 'admin' in self.path:
                      self.send_response(200)
                  else:
                      self.send_response(201)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(json.dumps({'message': 'Success'}).encode())

          with socketserver.TCPServer(('', 8080), MockHandler) as httpd:
              print('Mock Server running on port 8080...')
              httpd.serve_forever()
          " &
          echo "Mock Server started in background."
          sleep 3

      - name: Execute Selenium Web E2E Tests
        run: |
          cd automation_and_security_suite/selenium_web_tests
          # Start Chromedriver and execute tests
          export TEST_TARGET_URL="http://localhost:8080"
          npm test || true # Continue even if E2E fails to allow report generation

      - name: Execute Backend Load & Performance Tests
        run: |
          cd automation_and_security_suite/backend_load_tests
          export TARGET_API_URL="http://localhost:8080"
          python load_test.py || true

      - name: Execute DAST Vulnerability Scans
        run: |
          cd automation_and_security_suite/security_vuln_tests
          export TARGET_API_URL="http://localhost:8080"
          python vuln_scanner.py || true

      - name: Upload Web Test Result Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-results
          path: automation_and_security_suite/selenium_web_tests/selenium_results.json

      - name: Upload Load Test Result Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-load-results
          path: automation_and_security_suite/backend_load_tests/load_results.json

      - name: Upload Security Vuln Result Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-vuln-results
          path: automation_and_security_suite/security_vuln_tests/security_results.json

  mobile-appium:
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java Runtime (Java 17 required for Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Appium & UIAutomator2 Driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Mobile Test Dependencies
        run: |
          cd automation_and_security_suite/mobile_appium_tests
          npm install

      - name: Start Appium Server (Background)
        run: |
          appium --log-no-colors-log-level info > appium.log &
          echo "Appium server started."
          sleep 5

      - name: Install Flutter app dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Flutter APK
        working-directory: frontend
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m"
        run: flutter build apk --debug --verbose

      - name: Copy built APK to testing location
        run: cp frontend/build/app/outputs/flutter-apk/app-debug.apk automation_and_security_suite/app-release.apk

      - name: Boot Android Emulator & Run Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu off -no-audio -no-boot-anim
          disable-animations: true
          script: |
            cd automation_and_security_suite/mobile_appium_tests
            export APPIUM_HOST="127.0.0.1"
            export APPIUM_PORT="4723"
            export ANDROID_APK_PATH="../app-release.apk"
            npm test || true

      - name: Upload Mobile Test Result Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-appium-results
          path: automation_and_security_suite/mobile_appium_tests/mobile_results.json

      - name: Deploy APK to GitHub Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Android Build"
          draft: false
          prerelease: false
          files: frontend/build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compile-report:
    runs-on: ubuntu-latest
    needs: [web-backend-security, mobile-appium]
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Runtime
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install openpyxl Reporting Dependency
        run: pip install openpyxl

      - name: Download Selenium Web Results
        uses: actions/download-artifact@v4
        with:
          name: selenium-web-results
          path: automation_and_security_suite/selenium_web_tests/

      - name: Download Appium Mobile Results
        uses: actions/download-artifact@v4
        with:
          name: mobile-appium-results
          path: automation_and_security_suite/mobile_appium_tests/

      - name: Download Backend Load Results
        uses: actions/download-artifact@v4
        with:
          name: backend-load-results
          path: automation_and_security_suite/backend_load_tests/

      - name: Download Security Vuln Results
        uses: actions/download-artifact@v4
        with:
          name: security-vuln-results
          path: automation_and_security_suite/security_vuln_tests/

      - name: Execute Master Report Compiler
        run: |
          cd automation_and_security_suite/reporting_engine
          # Outputs the LocalSync_Test_Report_[TIMESTAMP].xlsx inside repo root
          python generate_master_report.py ../../

      - name: Archive Master Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalSync-Unified-E2E-Security-Report
          path: "*.xlsx"
